<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ReceiptLooker Digit Demo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <main class="page">
      <h1>Digit prediction</h1>

      <form method="post" class="controls">
        <button type="submit">Generate number</button>
      </form>

      {% if result %}
      <section class="panel">
        <img src="{{ result.image_data }}" alt="Generated digit image" />
        <div class="results">
          <div><span>Generated</span><strong>{{ result.target_digit }}</strong></div>
          <div><span>Predicted</span><strong>{{ result.predicted_digit }}</strong></div>
          <div><span>Confidence</span><strong>{{ "%.1f"|format(result.confidence * 100) }}%</strong></div>
        </div>
      </section>
      {% endif %}
    </main>
  </body>
</html>
